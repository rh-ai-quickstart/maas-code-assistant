{{- with .Values.gateways.maasDefaultGateway }}
{{- if .create }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: maas-default-gateway-config
  namespace: openshift-ingress
data:
  deployment: |
    spec:
      template:
        spec:
          containers:
          - name: istio-proxy
            {{- with .resources }}
            resources:
              {{- toYaml . | nindent 16 }}
            {{- end }}
{{- if .useRoute }}
  service: |
    spec:
      type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: maas-default-gateway
  namespace: openshift-ingress
spec:
  host: {{ .hostname | default (printf "maas.%s" $.Values.global.wildcardDomain) }}
  port:
    targetPort: 80
  tls:
    insecureEdgeTerminationPolicy: Allow
    termination: edge
  to:
    kind: Service
    name: maas-default-gateway-openshift-default
    weight: 100
  wildcardPolicy: None
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: maas-default-gateway
  namespace: openshift-ingress
  labels:
    opendatahub.io/managed: "false"
  annotations:
    opendatahub.io/managed: "false"
    security.opendatahub.io/authorino-tls-bootstrap: "true"
spec:
  gatewayClassName: openshift-default
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: maas-default-gateway-config
  listeners:
    {{- if .useRoute }}
    - name: http
      port: 80
      protocol: HTTP
      hostname: {{ .hostname | default (printf "maas.%s" $.Values.global.wildcardDomain) }}
      allowedRoutes:
        namespaces:
          from: All
    {{- else }}
    - name: https
      port: 443
      protocol: HTTPS
      hostname: {{ .hostname | default (printf "maas.%s" $.Values.global.wildcardDomain) }}
      tls:
        certificateRefs:
        - group: ""
          kind: Secret
          name: {{ $.Values.global.wildcardCertName }}
        mode: Terminate
      allowedRoutes:
        namespaces:
          from: All
    {{- end }}
{{- end }}
{{- end }}
