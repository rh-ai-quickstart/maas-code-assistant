{{- if .Values.lws.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: create-leaderworkerset
  namespace: openshift-lws-operator
  labels:
    {{- include "dependency-operators.labels" $ | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: create-leaderworkerset
  labels:
    {{- include "dependency-operators.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: leaderworkersetoperators.operator.openshift.io-v1-admin
subjects:
- kind: ServiceAccount
  name: create-leaderworkerset
  namespace: openshift-lws-operator
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: create-leaderworkerset
  namespace: openshift-lws-operator
  labels:
    {{- include "dependency-operators.labels" $ | nindent 4 }}
data:
{{ tpl ($.Files.Glob "files/lws/*").AsConfig . | indent 2 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-leaderworkerset
  namespace: openshift-lws-operator
  labels:
    {{- include "dependency-operators.labels" $ | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 4
  template:
    spec:
      serviceAccountName: create-leaderworkerset
      restartPolicy: Never
      containers:
      - name: create-leaderworkerset
        image: {{ $.Values.global.toolsImage }}
        imagePullPolicy: IfNotPresent
        workingDir: /app
        command: ["/app/create-lwso.sh"]
        args: []
        volumeMounts:
          - name: create-leaderworkerset-script
            mountPath: /app
      volumes:
        - name: create-leaderworkerset-script
          configMap:
            name: create-leaderworkerset
            defaultMode: 493
{{- end }}
