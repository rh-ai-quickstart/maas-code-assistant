{{- range $user := ((include "maas-code-assistant.users" .) | fromJsonArray)  }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wksp-edit-{{ $user }}
  namespace: {{ $.Values.workspace.namespacePrefix }}-{{ $user }}
  labels:
    {{- include "maas-code-assistant.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: {{ $user }}
{{- end }}
