kind: ConfigMap
apiVersion: v1
metadata:
  name: tier-to-group-mapping
  namespace: redhat-ods-applications
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
    app: maas-api
    component: tier-mapping
    app.kubernetes.io/part-of: models-as-a-service
    platform.opendatahub.io/part-of: modelsasservice
    app.opendatahub.io/modelsasservice: "true"
  annotations:
    helm.sh/resource-policy: keep
data:
  tiers: |
    # Free tier - default for all authenticated users
    - name: free
      displayName: Free Tier
      level: 0
      groups:
        - tier-free-users
        - system:authenticated  # Default for all authenticated users

    # Premium tier - for premium users
    - name: premium
      displayName: Premium Tier
      level: 1
      groups:
        - tier-premium-users

    # Enterprise tier - highest level
    - name: enterprise
      displayName: Enterprise Tier
      level: 2
      groups:
        - tier-enterprise-users
