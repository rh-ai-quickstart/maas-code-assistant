{{- if .Values.kuadrant.restart }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: restart-kuadrant
  namespace: {{ .Values.kuadrant.namespace }}
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: restart-kuadrant-namespace-edit
  namespace: {{ .Values.kuadrant.namespace }}
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: restart-kuadrant
    namespace: {{ .Values.kuadrant.namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: restart-kuadrant-script
  namespace: {{ .Values.kuadrant.namespace }}
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
data:
{{ (.Files.Glob "files/restart-kuadrant.*").AsConfig | indent 2 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: restart-kuadrant
  namespace: {{ .Values.kuadrant.namespace }}
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 4
  template:
    spec:
      serviceAccountName: restart-kuadrant
      restartPolicy: Never
      containers:
        - name: restart-kuadrant
          image: {{ .Values.global.toolsImage }}
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command: ["/app/restart-kuadrant.sh"]
          args: []
          volumeMounts:
            - name: restart-kuadrant-script
              mountPath: /app
      volumes:
        - name: restart-kuadrant-script
          configMap:
            name: restart-kuadrant-script
            defaultMode: 493
{{- end }}
