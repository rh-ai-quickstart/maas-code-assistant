kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: {{ .Values.name }}
  {{- with .Values.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
spec:
  host: {{ .Values.name }}.{{ .Values.global.wildcardDomain }}
  to:
    kind: Service
    name: {{ .Values.name }}-service
    weight: 100
  port:
    targetPort: https
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
