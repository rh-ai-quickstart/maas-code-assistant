{{- if .Values.removeKubeAdmin }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: remove-kubeadmin
  namespace: kube-system
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: remove-kubeadmin
  namespace: kube-system
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: remove-kubeadmin
    namespace: kube-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: remove-kubeadmin
  namespace: kube-system
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 4
  template:
    spec:
      serviceAccount: remove-kubeadmin
      serviceAccountName: remove-kubeadmin
      restartPolicy: Never
      containers:
      - name: remove-kubeadmin
        image: {{ .Values.global.toolsImage }}
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args:
          - -xc
          - |-
            oc delete secret kubeadmin ||:
{{- end }}
