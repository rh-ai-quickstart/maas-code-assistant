{{- if .Values.realm.create }}
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: {{ .Values.realm.name }}
  {{- with .Values.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
spec:
  keycloakCRName: {{ .Values.name }}
  realm:
    id: {{ .Values.realm.name }}
    realm: {{ .Values.realm.name }}
    enabled: true
    sslRequired: external
    registrationAllowed: false
    loginWithEmailAllowed: true
    duplicateEmailsAllowed: false
    clientScopes:
      - name: groups
        protocol: openid-connect
        attributes:
          include.in.token.scope: "true"
          display.on.consent.screen: "true"
          include.in.openid.provider.metadata: "true"
        protocolMappers:
          - name: groups
            protocol: openid-connect
            protocolMapper: oidc-usermodel-realm-role-mapper
            consentRequired: false
            config:
              introspection.token.claim: "true"
              multivalued: "true"
              user.attribute: "foo"
              id.token.claim: "true"
              access.token.claim: "true"
              claim.name: groups
              jsonType.label: "String"
    clients:
      - clientId: {{ .Values.realm.openshiftClientId }}
        enabled: true
        clientAuthenticatorType: client-secret
        secret: {{ .Values.realm.openshiftClientSecret }}
        publicClient: false
        redirectUris:
          - "*"
        standardFlowEnabled: true
        directAccessGrantsEnabled: true
        serviceAccountsEnabled: true
        frontchannelLogout: false
        protocol: openid-connect
        defaultClientScopes:
        - acr
        - basic
        - email
        - groups
        - profile
        - roles
        - service_account
        - web-origins
    roles:
      realm:
        - name: user
          description: "Default user role"
        - name: admin
          description: "Administrator role"
    users:
      {{- range $i := until (int .Values.realm.user.count) }}
      {{- $username := printf "%s%s" $.Values.realm.user.prefix (toString (add 1 $i)) }}
      - username: {{ $username }}
        enabled: true
        emailVerified: true
        email: {{ $username }}@demo.redhat.com
        firstName: {{ title $username }}
        lastName: Demo
        credentials:
          - type: password
            value: {{ $.Values.realm.user.password }}
            temporary: false
        realmRoles:
          - user
        groups:
          - users
      {{- end }}
      - username: {{ .Values.realm.admin.username }}
        enabled: true
        emailVerified: true
        email: {{ .Values.realm.admin.username }}@demo.redhat.com
        firstName: {{ title .Values.realm.admin.username }}
        lastName: Demo
        credentials:
          - type: password
            value: {{ .Values.realm.admin.password }}
            temporary: false
        realmRoles:
          - admin
        groups:
          - admins
    groups:
      - name: admins
      - name: users
{{- end }}
