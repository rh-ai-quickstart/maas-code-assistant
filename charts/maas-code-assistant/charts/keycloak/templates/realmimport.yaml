{{- if .Values.realm.create }}
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: {{ .Values.realm.name }}
  {{- with .Values.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
spec:
  keycloakCRName: {{ .Values.name }}
  realm:
    id: {{ .Values.realm.name }}
    realm: {{ .Values.realm.name }}
    enabled: true
    sslRequired: external
    registrationAllowed: false
    loginWithEmailAllowed: true
    duplicateEmailsAllowed: false
    clientScopes:
      - attributes:
          display.on.consent.screen: 'false'
          include.in.token.scope: 'false'
        description: OpenID Connect scope for add all basic claims to the token
        name: basic
        protocol: openid-connect
        protocolMappers:
        - config:
            access.token.claim: 'true'
            claim.name: auth_time
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: long
            user.session.note: AUTH_TIME
          consentRequired: false
          name: auth_time
          protocol: openid-connect
          protocolMapper: oidc-usersessionmodel-note-mapper
        - config:
            access.token.claim: 'true'
            introspection.token.claim: 'true'
          consentRequired: false
          name: sub
          protocol: openid-connect
          protocolMapper: oidc-sub-mapper
      - attributes:
          consent.screen.text: ''
          display.on.consent.screen: 'true'
          gui.order: ''
          include.in.openid.provider.metadata: 'true'
          include.in.token.scope: 'true'
        description: ''
        name: groups
        protocol: openid-connect
        protocolMappers:
        - config:
            access.token.claim: 'true'
            claim.name: groups
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            multivalued: 'true'
            user.attribute: foo
          consentRequired: false
          name: groups
          protocol: openid-connect
          protocolMapper: oidc-usermodel-realm-role-mapper
      - attributes:
          consent.screen.text: ${rolesScopeConsentText}
          display.on.consent.screen: 'true'
          include.in.token.scope: 'false'
        description: OpenID Connect scope for add user roles to the access token
        name: roles
        protocol: openid-connect
        protocolMappers:
        - config:
            access.token.claim: 'true'
            claim.name: realm_access.roles
            introspection.token.claim: 'true'
            jsonType.label: String
            multivalued: 'true'
            user.attribute: foo
          consentRequired: false
          name: realm roles
          protocol: openid-connect
          protocolMapper: oidc-usermodel-realm-role-mapper
        - config:
            access.token.claim: 'true'
            introspection.token.claim: 'true'
          consentRequired: false
          name: audience resolve
          protocol: openid-connect
          protocolMapper: oidc-audience-resolve-mapper
        - config:
            access.token.claim: 'true'
            claim.name: resource_access.${client_id}.roles
            introspection.token.claim: 'true'
            jsonType.label: String
            multivalued: 'true'
            user.attribute: foo
          consentRequired: false
          name: client roles
          protocol: openid-connect
          protocolMapper: oidc-usermodel-client-role-mapper
      - attributes:
          display.on.consent.screen: 'false'
          include.in.token.scope: 'false'
        description: OpenID Connect scope for add acr (authentication context class reference)
          to the token
        name: acr
        protocol: openid-connect
        protocolMappers:
        - config:
            access.token.claim: 'true'
            id.token.claim: 'true'
            introspection.token.claim: 'true'
          consentRequired: false
          name: acr loa level
          protocol: openid-connect
          protocolMapper: oidc-acr-mapper
      - attributes:
          consent.screen.text: ${addressScopeConsentText}
          display.on.consent.screen: 'true'
          include.in.token.scope: 'true'
        description: 'OpenID Connect built-in scope: address'
        name: address
        protocol: openid-connect
        protocolMappers:
        - config:
            access.token.claim: 'true'
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            user.attribute.country: country
            user.attribute.formatted: formatted
            user.attribute.locality: locality
            user.attribute.postal_code: postal_code
            user.attribute.region: region
            user.attribute.street: street
            userinfo.token.claim: 'true'
          consentRequired: false
          name: address
          protocol: openid-connect
          protocolMapper: oidc-address-mapper
      - attributes:
          display.on.consent.screen: 'false'
        description: Organization Membership
        name: saml_organization
        protocol: saml
        protocolMappers:
        - config: {}
          consentRequired: false
          name: organization
          protocol: saml
          protocolMapper: saml-organization-membership-mapper
      - attributes:
          consent.screen.text: ${emailScopeConsentText}
          display.on.consent.screen: 'true'
          include.in.token.scope: 'true'
        description: 'OpenID Connect built-in scope: email'
        name: email
        protocol: openid-connect
        protocolMappers:
        - config:
            access.token.claim: 'true'
            claim.name: email_verified
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: boolean
            user.attribute: emailVerified
            userinfo.token.claim: 'true'
          consentRequired: false
          name: email verified
          protocol: openid-connect
          protocolMapper: oidc-usermodel-property-mapper
        - config:
            access.token.claim: 'true'
            claim.name: email
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.attribute: email
            userinfo.token.claim: 'true'
          consentRequired: false
          name: email
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
      - attributes:
          consent.screen.text: ${samlRoleListScopeConsentText}
          display.on.consent.screen: 'true'
        description: SAML role list
        name: role_list
        protocol: saml
        protocolMappers:
        - config:
            attribute.name: Role
            attribute.nameformat: Basic
            single: 'false'
          consentRequired: false
          name: role list
          protocol: saml
          protocolMapper: saml-role-list-mapper
      - attributes:
          consent.screen.text: ${phoneScopeConsentText}
          display.on.consent.screen: 'true'
          include.in.token.scope: 'true'
        description: 'OpenID Connect built-in scope: phone'
        name: phone
        protocol: openid-connect
        protocolMappers:
        - config:
            access.token.claim: 'true'
            claim.name: phone_number
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.attribute: phoneNumber
            userinfo.token.claim: 'true'
          consentRequired: false
          name: phone number
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
        - config:
            access.token.claim: 'true'
            claim.name: phone_number_verified
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: boolean
            user.attribute: phoneNumberVerified
            userinfo.token.claim: 'true'
          consentRequired: false
          name: phone number verified
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
      - attributes:
          consent.screen.text: ''
          display.on.consent.screen: 'false'
          include.in.token.scope: 'false'
        description: OpenID Connect scope for add allowed web origins to the access token
        name: web-origins
        protocol: openid-connect
        protocolMappers:
        - config:
            access.token.claim: 'true'
            introspection.token.claim: 'true'
          consentRequired: false
          name: allowed web origins
          protocol: openid-connect
          protocolMapper: oidc-allowed-origins-mapper
      - attributes:
          consent.screen.text: ${offlineAccessScopeConsentText}
          display.on.consent.screen: 'true'
        description: 'OpenID Connect built-in scope: offline_access'
        name: offline_access
        protocol: openid-connect
      - attributes:
          consent.screen.text: ${profileScopeConsentText}
          display.on.consent.screen: 'true'
          include.in.token.scope: 'true'
        description: 'OpenID Connect built-in scope: profile'
        name: profile
        protocol: openid-connect
        protocolMappers:
        - config:
            access.token.claim: 'true'
            claim.name: nickname
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.attribute: nickname
            userinfo.token.claim: 'true'
          consentRequired: false
          name: nickname
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
        - config:
            access.token.claim: 'true'
            claim.name: given_name
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.attribute: firstName
            userinfo.token.claim: 'true'
          consentRequired: false
          name: given name
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
        - config:
            access.token.claim: 'true'
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            userinfo.token.claim: 'true'
          consentRequired: false
          name: full name
          protocol: openid-connect
          protocolMapper: oidc-full-name-mapper
        - config:
            access.token.claim: 'true'
            claim.name: locale
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.attribute: locale
            userinfo.token.claim: 'true'
          consentRequired: false
          name: locale
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
        - config:
            access.token.claim: 'true'
            claim.name: middle_name
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.attribute: middleName
            userinfo.token.claim: 'true'
          consentRequired: false
          name: middle name
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
        - config:
            access.token.claim: 'true'
            claim.name: gender
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.attribute: gender
            userinfo.token.claim: 'true'
          consentRequired: false
          name: gender
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
        - config:
            access.token.claim: 'true'
            claim.name: website
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.attribute: website
            userinfo.token.claim: 'true'
          consentRequired: false
          name: website
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
        - config:
            access.token.claim: 'true'
            claim.name: family_name
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.attribute: lastName
            userinfo.token.claim: 'true'
          consentRequired: false
          name: family name
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
        - config:
            access.token.claim: 'true'
            claim.name: birthdate
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.attribute: birthdate
            userinfo.token.claim: 'true'
          consentRequired: false
          name: birthdate
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
        - config:
            access.token.claim: 'true'
            claim.name: updated_at
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: long
            user.attribute: updatedAt
            userinfo.token.claim: 'true'
          consentRequired: false
          name: updated at
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
        - config:
            access.token.claim: 'true'
            claim.name: profile
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.attribute: profile
            userinfo.token.claim: 'true'
          consentRequired: false
          name: profile
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
        - config:
            access.token.claim: 'true'
            claim.name: preferred_username
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.attribute: username
            userinfo.token.claim: 'true'
          consentRequired: false
          name: username
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
        - config:
            access.token.claim: 'true'
            claim.name: picture
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.attribute: picture
            userinfo.token.claim: 'true'
          consentRequired: false
          name: picture
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
        - config:
            access.token.claim: 'true'
            claim.name: zoneinfo
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.attribute: zoneinfo
            userinfo.token.claim: 'true'
          consentRequired: false
          name: zoneinfo
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
      - attributes:
          display.on.consent.screen: 'false'
          include.in.token.scope: 'false'
        description: Specific scope for a client enabled for service accounts
        name: service_account
        protocol: openid-connect
        protocolMappers:
        - config:
            access.token.claim: 'true'
            claim.name: client_id
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.session.note: client_id
          consentRequired: false
          name: Client ID
          protocol: openid-connect
          protocolMapper: oidc-usersessionmodel-note-mapper
        - config:
            access.token.claim: 'true'
            claim.name: clientAddress
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.session.note: clientAddress
          consentRequired: false
          name: Client IP Address
          protocol: openid-connect
          protocolMapper: oidc-usersessionmodel-note-mapper
        - config:
            access.token.claim: 'true'
            claim.name: clientHost
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.session.note: clientHost
          consentRequired: false
          name: Client Host
          protocol: openid-connect
          protocolMapper: oidc-usersessionmodel-note-mapper
      - attributes:
          consent.screen.text: ${organizationScopeConsentText}
          display.on.consent.screen: 'true'
          include.in.token.scope: 'true'
        description: Additional claims about the organization a subject belongs to
        name: organization
        protocol: openid-connect
        protocolMappers:
        - config:
            access.token.claim: 'true'
            claim.name: organization
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            multivalued: 'true'
          consentRequired: false
          name: organization
          protocol: openid-connect
          protocolMapper: oidc-organization-membership-mapper
      - attributes:
          display.on.consent.screen: 'false'
          include.in.token.scope: 'true'
        description: Microprofile - JWT built-in scope
        name: microprofile-jwt
        protocol: openid-connect
        protocolMappers:
        - config:
            access.token.claim: 'true'
            claim.name: upn
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            user.attribute: username
            userinfo.token.claim: 'true'
          consentRequired: false
          name: upn
          protocol: openid-connect
          protocolMapper: oidc-usermodel-attribute-mapper
        - config:
            access.token.claim: 'true'
            claim.name: groups
            id.token.claim: 'true'
            introspection.token.claim: 'true'
            jsonType.label: String
            multivalued: 'true'
            user.attribute: foo
          consentRequired: false
          name: groups
          protocol: openid-connect
          protocolMapper: oidc-usermodel-realm-role-mapper
    clients:
      - clientId: {{ .Values.realm.openshiftClientId }}
        enabled: true
        clientAuthenticatorType: client-secret
        secret: {{ .Values.realm.openshiftClientSecret }}
        publicClient: false
        redirectUris:
          - "*"
        standardFlowEnabled: true
        directAccessGrantsEnabled: true
        serviceAccountsEnabled: true
        frontchannelLogout: false
        protocol: openid-connect
        defaultClientScopes:
        - acr
        - basic
        - email
        - groups
        - profile
        - roles
        - service_account
        - web-origins
    roles:
      realm:
        - name: user
          description: "Default user role"
        - name: admin
          description: "Administrator role"
    users:
      {{- range $i := until (int .Values.realm.user.count) }}
      {{- $username := printf "%s%s" $.Values.realm.user.prefix (toString (add 1 $i)) }}
      - username: {{ $username }}
        enabled: true
        emailVerified: true
        email: {{ $username }}@demo.redhat.com
        firstName: {{ title $username }}
        lastName: Demo
        credentials:
          - type: password
            value: {{ $.Values.realm.user.password }}
            temporary: false
        realmRoles:
          - user
        groups:
          - users
      {{- end }}
      - username: {{ .Values.realm.admin.username }}
        enabled: true
        emailVerified: true
        email: {{ .Values.realm.admin.username }}@demo.redhat.com
        firstName: {{ title .Values.realm.admin.username }}
        lastName: Demo
        credentials:
          - type: password
            value: {{ .Values.realm.admin.password }}
            temporary: false
        realmRoles:
          - admin
        groups:
          - admins
    groups:
      - name: admins
      - name: users
{{- end }}
