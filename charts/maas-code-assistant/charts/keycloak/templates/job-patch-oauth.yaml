apiVersion: v1
kind: ServiceAccount
metadata:
  name: patch-oauth-{{ .Values.name }}
  namespace: openshift-authentication
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: patch-oauth-{{ .Values.name }}
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: patch-oauth-{{ .Values.name }}
    namespace: openshift-authentication
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: patch-oauth-{{ .Values.name }}-script
  namespace: openshift-authentication
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
data:
{{ tpl (.Files.Glob "files/*").AsConfig $ | indent 2 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: patch-oauth-{{ .Values.name }}
  namespace: openshift-authentication
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 4
  template:
    spec:
      serviceAccount: patch-oauth-{{ .Values.name }}
      serviceAccountName: patch-oauth-{{ .Values.name }}
      restartPolicy: Never
      containers:
      - name: patch-oauth
        image: {{ .Values.global.toolsImage }}
        imagePullPolicy: IfNotPresent
        workingDir: /app
        command: ["/app/patch-oauth.sh"]
        args: []
        volumeMounts:
          - name: patch-oauth-{{ .Values.name }}-script
            mountPath: /app
      volumes:
        - name: patch-oauth-{{ .Values.name }}-script
          configMap:
            name: patch-oauth-{{ .Values.name }}-script
            defaultMode: 493
