apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: user-workload-monitoring
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
spec:
  valuesFrom:
    - targetPath: secureJsonData.httpHeaderValue1
      valueFrom:
        secretKeyRef:
          name: grafana-auth-secret
          key: token
  instanceSelector:
    matchLabels:
      {{- include  "maas-code-assistant.selectorLabels" . | nindent 6 }}
  datasource:
    access: proxy
    database: prometheus
    isDefault: true
    jsonData:
      httpHeaderName1: Authorization
      timeInterval: 5s
      tlsSkipVerify: true
    secureJsonData:
      httpHeaderValue1: Bearer ${token}
    name: Prometheus
    type: prometheus
    url: https://thanos-querier.openshift-monitoring.svc:9091
