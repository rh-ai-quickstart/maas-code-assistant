apiVersion: v1
kind: ConfigMap
metadata:
  name: create-consolelink-script
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
data:
{{ (.Files.Glob "files/consolelink/*").AsConfig | indent 2 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-consolelink
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "maas-code-assistant.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 4
  template:
    spec:
      serviceAccountName: create-consolelink
      restartPolicy: Never
      containers:
      - name: create-consolelink
        image: {{ .Values.global.toolsImage }}
        imagePullPolicy: IfNotPresent
        command: ["/mnt/create-consolelink.sh"]
        volumeMounts:
          - name: create-consolelink-script
            mountPath: /mnt
      volumes:
        - name: create-consolelink-script
          configMap:
            name: create-consolelink-script
            defaultMode: 493
