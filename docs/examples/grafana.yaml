---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    config.openshift.io/inject-trusted-cabundle: "true"
  name: ocp-injected-certs
  namespace: grafana
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: grafana-proxy
rules:
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: grafana-proxy
subjects:
  - kind: ServiceAccount
    name: grafana-sa
    namespace: grafana
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-monitoring-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: grafana-sa
    namespace: grafana
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: grafana-operator-fix-finalizer-permissions
rules:
  - apiGroups:
      - ""
    resources:
      - secrets/finalizers
    verbs:
      - "*"
  - apiGroups:
      - grafana.integreatly.org
    resources:
      - "*/finalizers"
    verbs:
      - "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-operator-fix-finalizer-permissions
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: grafana-operator-fix-finalizer-permissions
subjects:
  - kind: ServiceAccount
    name: grafana-operator-controller-manager
    namespace: grafana
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-all-login
  namespace: grafana
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:authenticated:oauth
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-auth-secret
  namespace: grafana
  annotations:
    kubernetes.io/service-account.name: grafana-sa
type: kubernetes.io/service-account-token
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-proxy
  namespace: grafana
type: Opaque
stringData:
  session_secret: d0fbMgqvP9F14ge4Sh5xIlkbSw8mRUug3ArOi
---
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    app: grafana
  namespace: grafana
spec:
  config:
    analytics:
      check_for_plugin_updates: "false"
      check_for_updates: "false"
      enabled: "false"
      reporting_enabled: "false"
    log:
      mode: "console"
      level: "warn"
    auth:
      disable_login_form: "true"
      disable_signout_menu: "true"
    auth.anonymous:
      enabled: "true"
      org_role: Admin
    auth.basic:
      enabled: "false"
  deployment:
    spec:
      template:
        spec:
          volumes:
            - name: secret-grafana-tls
              secret:
                secretName: grafana-tls
            - name: secret-grafana-proxy
              secret:
                secretName: grafana-proxy
            - configMap:
                defaultMode: 420
                name: ocp-injected-certs
              name: ocp-injected-certs
            - name: grafana-data
              persistentVolumeClaim:
                claimName: grafana-pvc
          containers:
            - name: grafana
            - name: oauth-proxy
              args:
                - "--provider=openshift"
                - "--pass-basic-auth=false"
                - "--https-address=:9091"
                - "--http-address="
                - "--email-domain=*"
                - "--upstream=http://localhost:3000"
                - "--tls-cert=/etc/tls/private/tls.crt"
                - "--tls-key=/etc/tls/private/tls.key"
                - "--openshift-service-account=grafana-sa"
                - "--cookie-secret-file=/etc/proxy/secrets/session_secret"
                - "--openshift-ca=/etc/pki/tls/cert.pem"
                - "--openshift-ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                - "--openshift-ca=/etc/proxy/certs/ca-bundle.crt"
                - "--skip-auth-regex=^/metrics"
                - "--skip-auth-regex=^/api/health"
                - '--openshift-sar={"namespace": "grafana", "resource": "services", "verb": "get"}'
              image: image-registry.openshift-image-registry.svc:5000/openshift/oauth-proxy:v4.4
              ports:
                - containerPort: 9091
                  name: oauth
              resources:
                limits:
                  cpu: 400m
                  memory: 250Mi
                requests:
                  cpu: 50m
                  memory: 50Mi
              volumeMounts:
                - mountPath: /etc/tls/private
                  name: secret-grafana-tls
                - mountPath: /etc/proxy/secrets
                  name: secret-grafana-proxy
                - mountPath: /etc/proxy/certs
                  name: ocp-injected-certs
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
  route:
    spec:
      port:
        targetPort: oauth
      tls:
        insecureEdgeTerminationPolicy: Redirect
        termination: reencrypt
  service:
    metadata:
      annotations:
        service.beta.openshift.io/serving-cert-secret-name: grafana-tls
    spec:
      ports:
        - name: oauth
          port: 9091
          protocol: TCP
          targetPort: oauth
  serviceAccount:
    automountServiceAccountToken: true
    metadata:
      annotations:
        argocd.argoproj.io/compare-options: IgnoreExtraneous
        serviceaccounts.openshift.io/oauth-redirectreference.primary: >-
          {"kind": "OAuthRedirectReference", "apiVersion": "v1", "reference": {"kind": "Route", "name": "grafana-route"}}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: user-workload-monitoring
  namespace: grafana
  labels:
    app: grafana
spec:
  valuesFrom:
    - targetPath: secureJsonData.httpHeaderValue1
      valueFrom:
        secretKeyRef:
          name: grafana-auth-secret
          key: token
  instanceSelector:
    matchLabels:
      app: grafana
  datasource:
    access: proxy
    database: prometheus
    isDefault: true
    jsonData:
      httpHeaderName1: Authorization
      timeInterval: 5s
      tlsSkipVerify: true
    secureJsonData:
      httpHeaderValue1: Bearer ${token}
    name: Prometheus
    type: prometheus
    url: https://thanos-querier.openshift-monitoring.svc:9091
